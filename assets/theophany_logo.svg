<svg width="600" height="120" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ba00e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#df4eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ba00e0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="600" height="120" fill="transparent" />
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="48" letter-spacing="12" fill="url(#logoGradient)" filter="url(#glow)">
    THEOPHANY
  </text>
</svg>
